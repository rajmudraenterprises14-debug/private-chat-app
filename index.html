<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Private Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        html, body { height: 100%; overflow: hidden; background: #0b141a; }
        
        :root {
            --bg-primary: #111b21;
            --bg-secondary: #1f2c33;
            --bg-chat: #0b141a;
            --bg-message-sent: #005c4b;
            --bg-message-received: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent: #25d366;
            --border-color: #2a3942;
            --header-height: 60px;
        }
        
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --bg-chat: #efeae2;
            --bg-message-sent: #d9fdd3;
            --bg-message-received: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --border-color: #e9edef;
        }
        
        .app-container { display: flex; width: 100%; height: 100vh; background: var(--bg-primary); overflow: hidden; }
        
        /* ===== SIDEBAR ===== */
        .sidebar { 
            width: 100%; 
            max-width: 380px; 
            min-width: 280px;
            background: var(--bg-primary); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            z-index: 10;
        }
        .sidebar.hidden-sidebar {
            transform: translateX(-100%);
        }
        
        .sidebar-header { 
            padding: 12px 16px; 
            background: var(--bg-secondary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: var(--header-height);
            flex-shrink: 0;
        }
        .sidebar-header .user-info { display: flex; align-items: center; gap: 12px; }
        .sidebar-header .avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            background: var(--accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            color: white; 
            font-size: 18px; 
            flex-shrink: 0;
        }
        .sidebar-header .name { color: var(--text-primary); font-weight: 600; font-size: 16px; }
        .sidebar-header .header-actions { display: flex; gap: 2px; }
        .sidebar-header .header-actions button { 
            background: transparent; 
            border: none; 
            color: var(--text-secondary); 
            font-size: 18px; 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            width: 36px; 
            height: 36px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
        }
        .sidebar-header .header-actions button:hover { background: var(--border-color); }
        
        .search-box { 
            padding: 6px 12px; 
            background: var(--bg-primary); 
            flex-shrink: 0;
        }
        .search-box .search-wrapper { 
            background: var(--bg-message-received); 
            border-radius: 8px; 
            padding: 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .search-box .search-wrapper span { color: var(--text-secondary); font-size: 16px; }
        .search-box input { 
            width: 100%; 
            padding: 8px 0; 
            border: none; 
            background: transparent; 
            color: var(--text-primary); 
            font-size: 14px; 
            outline: none; 
        }
        .search-box input::placeholder { color: var(--text-secondary); }
        
        .users-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 4px 0; 
            -webkit-overflow-scrolling: touch;
        }
        .users-list .user-item { 
            padding: 10px 16px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            cursor: pointer; 
            transition: 0.15s; 
            border-radius: 0;
        }
        .users-list .user-item:hover { background: var(--bg-message-received); }
        .users-list .user-item.active { background: var(--border-color); }
        .users-list .user-item .avatar { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            color: white; 
            font-size: 18px; 
            flex-shrink: 0; 
        }
        .users-list .user-item .info { flex: 1; min-width: 0; }
        .users-list .user-item .info .name { color: var(--text-primary); font-weight: 500; font-size: 16px; }
        .users-list .user-item .info .last-msg { color: var(--text-secondary); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ===== CHAT AREA ===== */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-chat); 
            min-width: 0;
            height: 100vh;
            position: relative;
        }
        
        .chat-header { 
            padding: 8px 16px; 
            background: var(--bg-secondary); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-bottom: 1px solid var(--border-color); 
            height: var(--header-height);
            flex-shrink: 0;
        }
        .chat-header .back-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }
        .chat-header .avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            color: white; 
            font-size: 18px; 
            flex-shrink: 0; 
        }
        .chat-header .info { flex: 1; min-width: 0; }
        .chat-header .info .name { color: var(--text-primary); font-weight: 600; font-size: 16px; }
        .chat-header .info .status { color: var(--text-secondary); font-size: 13px; }
        .chat-header .actions { display: flex; gap: 2px; flex-shrink: 0; }
        .chat-header .actions button { 
            background: transparent; 
            border: none; 
            color: var(--text-secondary); 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 50%; 
            font-size: 18px; 
            transition: 0.2s; 
            width: 36px; 
            height: 36px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .chat-header .actions button:hover { background: var(--border-color); }
        .chat-header .actions .clear-btn { color: #ef4444; font-size: 13px; font-weight: 500; }
        
        .messages-box { 
            flex: 1; 
            padding: 16px 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            background: var(--bg-chat);
            -webkit-overflow-scrolling: touch;
            padding-bottom: 80px;
        }
        .messages-box .message { 
            max-width: 70%; 
            padding: 6px 12px 7px 12px; 
            border-radius: 8px; 
            word-wrap: break-word; 
            position: relative; 
            font-size: 14px; 
            line-height: 1.4; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
        }
        .messages-box .message.sent { 
            background: var(--bg-message-sent); 
            color: var(--text-primary); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        .messages-box .message.received { 
            background: var(--bg-message-received); 
            color: var(--text-primary); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
        }
        .messages-box .message .msg-text { word-wrap: break-word; }
        .messages-box .message .time { 
            font-size: 10px; 
            opacity: 0.6; 
            margin-left: 8px; 
            float: right; 
            margin-top: 2px; 
        }
        .messages-box .message img { 
            max-width: 200px; 
            max-height: 200px; 
            border-radius: 6px; 
            display: block; 
            margin: 3px 0; 
            cursor: pointer;
        }
        
        .empty-state { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: var(--text-secondary); 
            gap: 8px; 
            text-align: center;
        }
        .empty-state .icon { font-size: 48px; opacity: 0.2; }
        .empty-state h3 { color: var(--text-primary); font-weight: 400; font-size: 17px; }
        .empty-state p { font-size: 13px; }
        
        /* ===== CHAT INPUT ===== */
        .chat-input-wrapper {
            display: none;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }
        .chat-input-wrapper.show {
            display: block !important;
        }
        
        .image-preview { 
            display: none; 
            padding: 6px 12px; 
            background: var(--bg-secondary); 
            align-items: center; 
            gap: 10px; 
        }
        .image-preview.show { display: flex; }
        .image-preview img { max-height: 60px; border-radius: 6px; }
        .image-preview .remove-btn { 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 3px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px; 
        }
        .chat-input { 
            padding: 5px 12px; 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            height: 62px;
        }
        .chat-input .attach-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-secondary); 
            font-size: 20px; 
            cursor: pointer; 
            padding: 4px; 
            flex-shrink: 0;
            transition: 0.2s; 
        }
        .chat-input .attach-btn:hover { color: var(--text-primary); }
        .chat-input input { 
            flex: 1; 
            padding: 8px 14px; 
            border-radius: 20px; 
            border: none; 
            background: var(--bg-message-received); 
            color: var(--text-primary); 
            font-size: 14px; 
            outline: none; 
            min-width: 0;
        }
        .chat-input input::placeholder { color: var(--text-secondary); }
        .chat-input .send-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 7px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px; 
            transition: 0.2s; 
            flex-shrink: 0;
        }
        .chat-input .send-btn:hover { background: #1da85a; }
        .chat-input .send-btn:active { transform: scale(0.95); }
        
        /* ===== LOGIN ===== */
        .login-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            height: 100vh; 
            background: #0b141a; 
            padding: 16px;
        }
        .login-box { 
            background: var(--bg-secondary); 
            padding: 32px 28px; 
            border-radius: 20px; 
            width: 400px; 
            max-width: 100%; 
        }
        .login-box .logo { text-align: center; font-size: 42px; margin-bottom: 4px; }
        .login-box h1 { color: var(--text-primary); font-size: 24px; text-align: center; }
        .login-box .subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 13px; }
        .login-box .form-group { margin-bottom: 14px; }
        .login-box .form-group label { color: var(--text-secondary); font-size: 12px; font-weight: 500; display: block; margin-bottom: 3px; }
        .login-box .form-group input { 
            width: 100%; 
            padding: 10px 14px; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-size: 14px; 
            outline: none; 
            transition: 0.2s; 
        }
        .login-box .form-group input:focus { border-color: var(--accent); }
        .login-box .login-btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            background: var(--accent); 
            color: white; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .login-box .login-btn:hover { background: #1da85a; }
        .login-box .error { 
            background: #3a1a1a; 
            color: #f5a5a5; 
            padding: 8px 12px; 
            border-radius: 8px; 
            margin-bottom: 14px; 
            font-size: 13px; 
            display: none; 
        }
        .login-box .error.show { display: block; }
        .login-box .footer-text { color: var(--text-secondary); font-size: 11px; text-align: center; margin-top: 10px; }
        
        .hidden { display: none !important; }
        
        /* ===== SETTINGS MODAL ===== */
        .settings-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .settings-overlay.show { display: flex; }
        .settings-modal { 
            background: var(--bg-secondary); 
            padding: 24px; 
            border-radius: 16px; 
            width: 400px; 
            max-width: 100%; 
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-modal h2 { color: var(--text-primary); margin-bottom: 16px; font-size: 20px; }
        .settings-modal .form-group { margin-bottom: 12px; }
        .settings-modal .form-group label { color: var(--text-secondary); font-size: 12px; font-weight: 500; display: block; margin-bottom: 3px; }
        .settings-modal .form-group input, .settings-modal .form-group select { 
            width: 100%; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-size: 14px; 
            outline: none; 
        }
        .settings-modal .form-group input:focus, .settings-modal .form-group select:focus { border-color: var(--accent); }
        .settings-modal .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
        .settings-modal .modal-actions button { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px; 
            flex: 1; 
        }
        .settings-modal .modal-actions .save-btn { background: var(--accent); color: white; }
        .settings-modal .modal-actions .save-btn:hover { background: #1da85a; }
        .settings-modal .modal-actions .close-btn { background: var(--border-color); color: var(--text-primary); }
        .settings-modal .modal-actions .close-btn:hover { background: #3a4a52; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a4a52; }
        
        /* ===== RESPONSIVE - MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar { 
                max-width: 85%;
                min-width: 0;
                width: 85%;
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(0);
                border-right: 1px solid var(--border-color);
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
                z-index: 100;
            }
            .sidebar.hidden-sidebar {
                transform: translateX(-100%);
            }
            .chat-area { 
                width: 100%; 
                height: 100vh;
            }
            .chat-header .back-btn { 
                display: block;
                font-size: 24px;
                padding: 4px 8px;
            }
            .messages-box { 
                padding: 12px 14px; 
                padding-bottom: 80px;
            }
            .messages-box .message { max-width: 85%; font-size: 13px; padding: 5px 10px 6px 10px; }
            .messages-box .message img { max-width: 140px; max-height: 140px; }
            
            .chat-input-wrapper {
                display: block !important;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--bg-secondary);
                border-top: 1px solid var(--border-color);
                z-index: 50;
                width: 100%;
                padding: 4px 0;
            }
            .chat-input-wrapper.hidden {
                display: none !important;
            }
            .chat-input {
                display: flex !important;
                padding: 4px 10px;
                gap: 6px;
                align-items: center;
                height: 52px;
                width: 100%;
            }
            .chat-input input {
                flex: 1;
                padding: 8px 14px;
                border-radius: 20px;
                border: none;
                background: var(--bg-message-received);
                color: var(--text-primary);
                font-size: 14px;
                outline: none;
                min-width: 50px;
                height: 38px;
            }
            .chat-input .send-btn {
                padding: 8px 16px;
                border-radius: 20px;
                background: var(--accent);
                color: white;
                border: none;
                font-weight: 600;
                font-size: 13px;
                cursor: pointer;
                flex-shrink: 0;
                height: 38px;
            }
            .chat-input .attach-btn {
                font-size: 20px;
                background: transparent;
                border: none;
                color: var(--text-secondary);
                cursor: pointer;
                padding: 4px;
                flex-shrink: 0;
            }
            .image-preview {
                display: none;
                padding: 4px 12px;
                background: var(--bg-secondary);
                align-items: center;
                gap: 10px;
            }
            .image-preview.show {
                display: flex !important;
            }
        }
        
        @media (max-width: 400px) {
            .messages-box .message { max-width: 92%; }
            .chat-input input { font-size: 12px; padding: 5px 10px; }
            .chat-input .send-btn { padding: 5px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ===== LOGIN PAGE ===== -->
        <div id="loginPage" class="login-container">
            <div class="login-box">
                <div class="logo">💬</div>
                <h1>Private Chat</h1>
                <p class="subtitle">Secure & Encrypted Messaging</p>
                <div id="loginError" class="error"></div>
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" id="loginUsername" placeholder="Choose a unique username" />
                </div>
                <div class="form-group">
                    <label>🔑 Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" />
                </div>
                <div class="form-group">
                    <label>📛 Display Name</label>
                    <input type="text" id="loginDisplayName" placeholder="Your display name" />
                </div>
                <button class="login-btn" id="loginBtn">Login / Register</button>
                <p class="footer-text">* New account will be created if username doesn't exist</p>
            </div>
        </div>

        <!-- ===== CHAT APP ===== -->
        <div id="chatApp" class="app-container hidden">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="avatar" id="myAvatar">U</div>
                        <span class="name" id="myName">User</span>
                    </div>
                    <div class="header-actions">
                        <button id="settingsBtn" title="Settings">⚙️</button>
                        <button id="logoutBtn" title="Logout">🚪</button>
                    </div>
                </div>
                <div class="search-box">
                    <div class="search-wrapper">
                        <span>🔍</span>
                        <input type="text" id="searchUsers" placeholder="Search or start a new chat" />
                    </div>
                </div>
                <div class="users-list" id="usersList">
                    <div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">📡 Loading users...</div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <div class="chat-header" id="chatHeader" style="display:none;">
                    <button class="back-btn" id="backBtn" title="Back">←</button>
                    <div class="avatar" id="chatAvatar" style="background:#25d366;">?</div>
                    <div class="info">
                        <div class="name" id="chatName">Select a user</div>
                        <div class="status" id="chatStatus">Online</div>
                    </div>
                    <div class="actions">
                        <button class="clear-btn" id="clearChatBtn" title="Clear chat">🗑️</button>
                    </div>
                </div>
                <div class="messages-box" id="messagesBox">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <h3>Select a user to start chatting</h3>
                        <p>Choose a contact from the sidebar</p>
                    </div>
                </div>
                <div class="chat-input-wrapper" id="chatInputWrapper">
                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="Preview" />
                        <button class="remove-btn" id="removeImageBtn">✕ Remove</button>
                    </div>
                    <div class="chat-input" id="chatInput">
                        <button class="attach-btn" id="attachBtn" title="Attach Image">📎</button>
                        <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                        <button class="attach-btn" id="cameraBtn" title="Take Photo">📷</button>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" />
                        <input type="text" id="messageInput" placeholder="Type a message..." />
                        <button class="send-btn" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== SETTINGS MODAL ===== -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-modal">
                <h2>⚙️ Settings</h2>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" />
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" />
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" />
                </div>
                <div class="form-group">
                    <label>Theme</label>
                    <select id="themeSelect">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div id="settingsError" style="color:#f5a5a5; font-size:13px; margin-bottom:8px; display:none;"></div>
                <div class="modal-actions">
                    <button class="save-btn" id="saveSettingsBtn">Save</button>
                    <button class="close-btn" id="closeSettingsBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ✅ YOUR RENDER URL - CHANGE THIS
        // ============================================================
        const API_BASE = 'https://private-chat-app-a5el.onrender.com';

        let currentUser = null;
        let currentToken = null;
        let selectedUserId = null;
        let messageInterval = null;
        let allUsers = [];
        let pendingImage = null;
        let currentTheme = 'dark';
        let isMobile = window.innerWidth <= 768;

        // DOM Elements
        const loginPage = document.getElementById('loginPage');
        const chatApp = document.getElementById('chatApp');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginDisplayName = document.getElementById('loginDisplayName');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const themeSelect = document.getElementById('themeSelect');
        const settingsError = document.getElementById('settingsError');
        const usersList = document.getElementById('usersList');
        const messagesBox = document.getElementById('messagesBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const myAvatar = document.getElementById('myAvatar');
        const myName = document.getElementById('myName');
        const chatHeader = document.getElementById('chatHeader');
        const chatInputWrapper = document.getElementById('chatInputWrapper');
        const chatAvatar = document.getElementById('chatAvatar');
        const chatName = document.getElementById('chatName');
        const chatStatus = document.getElementById('chatStatus');
        const searchUsers = document.getElementById('searchUsers');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const cameraBtn = document.getElementById('cameraBtn');
        const cameraInput = document.getElementById('cameraInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeImageBtn = document.getElementById('removeImageBtn');
        const sidebar = document.getElementById('sidebar');
        const backBtn = document.getElementById('backBtn');

        // ===== MOBILE SIDEBAR TOGGLE =====
        function toggleSidebar(show) {
            if (!isMobile) return;
            if (show === false) {
                sidebar.classList.add('hidden-sidebar');
            } else {
                sidebar.classList.remove('hidden-sidebar');
            }
        }

        function showChatOnMobile() {
            if (isMobile) {
                toggleSidebar(false);
            }
        }

        function showSidebarOnMobile() {
            if (isMobile) {
                toggleSidebar(true);
            }
        }

        backBtn.addEventListener('click', () => {
            showSidebarOnMobile();
            selectedUserId = null;
            chatHeader.style.display = 'none';
            chatInputWrapper.classList.remove('show');
            messagesBox.innerHTML = `<div class="empty-state"><div class="icon">💬</div><h3>Select a user to start chatting</h3><p>Choose a contact from the sidebar</p></div>`;
        });

        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                sidebar.classList.remove('hidden-sidebar');
            }
        });

        // ===== AUTO LOGOUT ON TAB CLOSE =====
        window.addEventListener('beforeunload', function() {
            if (currentToken) {
                navigator.sendBeacon(`${API_BASE}/api/auth/logout`, JSON.stringify({ token: currentToken }));
            }
        });

        // ===== CHECK IF USER IS ALREADY LOGGED IN =====
        async function checkActiveSession(username) {
            try {
                const response = await fetch(`${API_BASE}/api/auth/check-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await response.json();
                return data.active || false;
            } catch (e) {
                return false;
            }
        }

        function showError(msg) {
            loginError.textContent = msg;
            loginError.classList.add('show');
            setTimeout(() => loginError.classList.remove('show'), 5000);
        }

        function showSettingsError(msg) {
            settingsError.textContent = msg;
            settingsError.style.display = 'block';
            setTimeout(() => settingsError.style.display = 'none', 4000);
        }

        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (currentToken) {
                headers['Authorization'] = `Bearer ${currentToken}`;
            }
            const response = await fetch(url, {
                ...options,
                headers,
                body: options.body ? JSON.stringify(options.body) : undefined
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'API request failed');
            }
            return response.json();
        }

        // ===== THEME =====
        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('chatTheme', theme);
            themeSelect.value = theme;
        }

        // ===== AUTH =====
        async function login() {
            const username = loginUsername.value.trim().toLowerCase();
            const password = loginPassword.value;
            const displayName = loginDisplayName.value.trim();

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            // Check if username already exists and is active
            try {
                const isActive = await checkActiveSession(username);
                if (isActive) {
                    showError('⚠️ This user is already logged in from another device!');
                    return;
                }
            } catch (e) {}

            try {
                let result = await apiCall('/api/auth/login', {
                    method: 'POST',
                    body: { username, password }
                });
                handleAuthSuccess(result);
            } catch (error) {
                if (error.message.includes('already logged in')) {
                    showError('⚠️ This user is already logged in from another device!');
                    return;
                }
                if (!displayName) {
                    showError('Please enter a display name to create new account');
                    return;
                }
                try {
                    const result = await apiCall('/api/auth/register', {
                        method: 'POST',
                        body: { username, password, displayName }
                    });
                    handleAuthSuccess(result);
                } catch (regError) {
                    if (regError.message.includes('already taken')) {
                        showError('⚠️ Username already taken! Please choose another.');
                    } else {
                        showError(regError.message);
                    }
                }
            }
        }

        function handleAuthSuccess(data) {
            currentToken = data.token;
            currentUser = data.user;
            // Store session with timestamp
            const sessionData = {
                token: currentToken,
                user: currentUser,
                timestamp: Date.now()
            };
            localStorage.setItem('chatSession', JSON.stringify(sessionData));
            showChatApp();
            loadUsers();
            startPolling();
        }

        function logout() {
            if (currentToken) {
                apiCall('/api/auth/logout', {
                    method: 'POST',
                    body: { token: currentToken }
                }).catch(() => {});
            }
            currentToken = null;
            currentUser = null;
            selectedUserId = null;
            localStorage.removeItem('chatSession');
            stopPolling();
            showLoginPage();
        }

        function showLoginPage() {
            loginPage.style.display = 'flex';
            chatApp.classList.add('hidden');
        }

        function showChatApp() {
            loginPage.style.display = 'none';
            chatApp.classList.remove('hidden');
            myAvatar.textContent = currentUser.displayName.charAt(0).toUpperCase();
            myName.textContent = currentUser.displayName;
        }

        // ===== USERS =====
        async function loadUsers() {
            try {
                const users = await apiCall('/api/users');
                allUsers = users;
                renderUsers(users);
            } catch (error) {
                usersList.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">❌ Failed to load users</div>`;
            }
        }

        function renderUsers(users) {
            if (users.length === 0) {
                usersList.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">👤 No other users found.<br>Share this app with friends!</div>`;
                return;
            }
            usersList.innerHTML = users.map(user => `
                <div class="user-item" data-userid="${user.id}">
                    <div class="avatar" style="background: #${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')};">${user.displayName.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${user.displayName}</div>
                        <div class="last-msg">${user.username}</div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const userId = el.dataset.userid;
                    const user = allUsers.find(u => u.id === userId);
                    if (user) selectUser(user);
                });
            });
        }

        // ===== SELECT USER =====
        function selectUser(user) {
            selectedUserId = user.id;
            chatHeader.style.display = 'flex';
            chatInputWrapper.classList.add('show');
            
            const color = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
            chatAvatar.textContent = user.displayName.charAt(0).toUpperCase();
            chatAvatar.style.background = color;
            chatName.textContent = user.displayName;
            chatStatus.textContent = 'Online';

            document.querySelectorAll('.user-item').forEach(el => {
                el.classList.toggle('active', el.dataset.userid === user.id);
            });

            showChatOnMobile();
            loadMessages();
        }

        // ===== MESSAGES =====
        async function loadMessages() {
            if (!selectedUserId) return;
            try {
                const messages = await apiCall(`/api/messages?withUserId=${selectedUserId}`);
                renderMessages(messages);
            } catch (error) {
                messagesBox.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px;">❌ Failed to load messages</div>`;
            }
        }

        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesBox.innerHTML = `<div class="empty-state"><div class="icon">👋</div><h3>No messages yet</h3><p>Say hello to your friend!</p></div>`;
                return;
            }
            messagesBox.innerHTML = messages.map(msg => {
                const isSent = msg.senderId === currentUser.id;
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let displayText = msg.ciphertext;
                let isImage = false;
                try {
                    const decoded = atob(msg.ciphertext);
                    if (decoded.startsWith('data:image')) {
                        isImage = true;
                        displayText = decoded;
                    } else {
                        displayText = decoded;
                        try {
                            displayText = decodeURIComponent(escape(decoded));
                        } catch(e) {}
                    }
                } catch(e) {}
                
                let content = isImage 
                    ? `<img src="${displayText}" alt="Image" onclick="window.open('${displayText}','_blank')" />` 
                    : `<span class="msg-text">${displayText}</span>`;
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${content}
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const text = messageInput.value.trim();
            let imageData = pendingImage;

            if (!text && !imageData) {
                return;
            }
            if (!selectedUserId) {
                alert('Please select a user first');
                return;
            }

            try {
                let content = text || '📷 Image';
                if (imageData) {
                    content = imageData;
                    pendingImage = null;
                    imagePreview.classList.remove('show');
                    previewImg.src = '';
                }
                const ciphertext = btoa(content);
                const iv = crypto.randomUUID();
                
                await apiCall('/api/messages', {
                    method: 'POST',
                    body: { receiverId: selectedUserId, ciphertext, iv }
                });
                messageInput.value = '';
                loadMessages();
            } catch (error) {
                alert('Failed to send: ' + error.message);
            }
        }

        // ===== IMAGE HANDLING =====
        function handleImage(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                pendingImage = e.target.result;
                previewImg.src = pendingImage;
                imagePreview.classList.add('show');
            };
            reader.onerror = function() {
                alert('Failed to read image');
            };
            reader.readAsDataURL(file);
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
                e.target.value = '';
            }
        });

        cameraBtn.addEventListener('click', () => cameraInput.click());
        cameraInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
                e.target.value = '';
            }
        });

        removeImageBtn.addEventListener('click', () => {
            pendingImage = null;
            imagePreview.classList.remove('show');
            previewImg.src = '';
        });

        // ===== CLEAR CHAT =====
        async function clearChat() {
            if (!selectedUserId) return;
            if (!confirm('Delete all messages with this user?')) return;
            try {
                await apiCall('/api/messages/clear', {
                    method: 'POST',
                    body: { withUserId: selectedUserId }
                });
                loadMessages();
            } catch (error) {
                alert('Failed to clear chat: ' + error.message);
            }
        }

        // ===== SETTINGS =====
        async function saveSettings() {
            const currentPass = currentPassword.value;
            const newPass = newPassword.value;
            const confirmPass = confirmPassword.value;
            const theme = themeSelect.value;

            applyTheme(theme);

            if (newPass || currentPass) {
                if (!currentPass) {
                    showSettingsError('Please enter current password');
                    return;
                }
                if (!newPass || newPass.length < 4) {
                    showSettingsError('New password must be at least 4 characters');
                    return;
                }
                if (newPass !== confirmPass) {
                    showSettingsError('New passwords do not match');
                    return;
                }

                try {
                    await apiCall('/api/auth/change-password', {
                        method: 'POST',
                        body: { currentPassword: currentPass, newPassword: newPass }
                    });
                    showSettingsError('✅ Password changed successfully!');
                    settingsError.style.color = '#4ade80';
                    setTimeout(() => {
                        settingsError.style.color = '#f5a5a5';
                        settingsError.style.display = 'none';
                    }, 3000);
                    currentPassword.value = '';
                    newPassword.value = '';
                    confirmPassword.value = '';
                } catch (error) {
                    showSettingsError(error.message);
                    return;
                }
            }

            settingsOverlay.classList.remove('show');
        }

        // ===== POLLING =====
        function startPolling() {
            stopPolling();
            messageInterval = setInterval(() => {
                if (selectedUserId) loadMessages();
                loadUsers();
            }, 3000);
        }

        function stopPolling() {
            if (messageInterval) {
                clearInterval(messageInterval);
                messageInterval = null;
            }
        }

        // ===== SEARCH =====
        searchUsers.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.displayName.toLowerCase().includes(query) || 
                u.username.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        });

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', login);
        loginPassword.addEventListener('keypress', (e) => e.key === 'Enter' && login());
        logoutBtn.addEventListener('click', logout);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
        clearChatBtn.addEventListener('click', clearChat);
        
        settingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.add('show');
        });
        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('show');
            settingsError.style.display = 'none';
        });
        saveSettingsBtn.addEventListener('click', saveSettings);
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) {
                settingsOverlay.classList.remove('show');
            }
        });

        // ===== INIT =====
        (async function init() {
            const savedTheme = localStorage.getItem('chatTheme') || 'dark';
            applyTheme(savedTheme);

            // Check for existing session
            const sessionData = localStorage.getItem('chatSession');
            if (sessionData) {
                try {
                    const session = JSON.parse(sessionData);
                    // Check if session is not too old (max 30 days)
                    if (Date.now() - session.timestamp < 30 * 24 * 60 * 60 * 1000) {
                        currentToken = session.token;
                        currentUser = session.user;
                        const me = await apiCall('/api/auth/me');
                        if (me.user) {
                            showChatApp();
                            loadUsers();
                            startPolling();
                            return;
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('chatSession');
                }
            }
            showLoginPage();
        })();
    </script>
</body>
</html>
