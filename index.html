<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Chat</title>
    <style>
        /* ===== GLOBAL STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0b141a; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        :root {
            --bg-primary: #111b21;
            --bg-secondary: #1f2c33;
            --bg-chat: #0b141a;
            --bg-message-sent: #005c4b;
            --bg-message-received: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent: #25d366;
            --border-color: #2a3942;
        }
        
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --bg-chat: #efeae2;
            --bg-message-sent: #d9fdd3;
            --bg-message-received: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --border-color: #e9edef;
        }
        
        .app-container { width: 100%; max-width: 1400px; height: 100vh; max-height: 900px; background: var(--bg-primary); display: flex; border-radius: 0; overflow: hidden; }
        
        /* ===== SIDEBAR ===== */
        .sidebar { width: 410px; min-width: 280px; background: var(--bg-primary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; height: 100%; }
        .sidebar-header { padding: 16px; background: var(--bg-secondary); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header .user-info { display: flex; align-items: center; gap: 14px; }
        .sidebar-header .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 18px; }
        .sidebar-header .name { color: var(--text-primary); font-weight: 600; font-size: 17px; }
        .sidebar-header .header-actions { display: flex; gap: 4px; }
        .sidebar-header .header-actions button { background: transparent; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 6px; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .sidebar-header .header-actions button:hover { background: var(--border-color); }
        
        .search-box { padding: 6px 12px; background: var(--bg-primary); }
        .search-box .search-wrapper { background: var(--bg-message-received); border-radius: 8px; padding: 0 12px; display: flex; align-items: center; gap: 10px; }
        .search-box .search-wrapper span { color: var(--text-secondary); }
        .search-box input { width: 100%; padding: 9px 0; border: none; background: transparent; color: var(--text-primary); font-size: 14px; outline: none; }
        .search-box input::placeholder { color: var(--text-secondary); }
        
        .users-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .users-list .user-item { padding: 10px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: 0.15s; }
        .users-list .user-item:hover { background: var(--bg-message-received); }
        .users-list .user-item.active { background: var(--border-color); }
        .users-list .user-item .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 18px; flex-shrink: 0; }
        .users-list .user-item .info { flex: 1; min-width: 0; }
        .users-list .user-item .info .name { color: var(--text-primary); font-weight: 500; font-size: 16px; }
        .users-list .user-item .info .last-msg { color: var(--text-secondary); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ===== CHAT AREA ===== */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); }
        .chat-header { padding: 10px 16px; background: var(--bg-secondary); display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-color); }
        .chat-header .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 18px; flex-shrink: 0; }
        .chat-header .info { flex: 1; }
        .chat-header .info .name { color: var(--text-primary); font-weight: 600; font-size: 16px; }
        .chat-header .info .status { color: var(--text-secondary); font-size: 13px; }
        .chat-header .actions { display: flex; gap: 4px; }
        .chat-header .actions button { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 50%; font-size: 18px; transition: 0.2s; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
        .chat-header .actions button:hover { background: var(--border-color); }
        .chat-header .actions .clear-btn { color: #ef4444; font-size: 13px; font-weight: 500; }
        
        .messages-box { flex: 1; padding: 20px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; background: var(--bg-chat); }
        .messages-box .message { max-width: 65%; padding: 7px 12px 8px 12px; border-radius: 8px; word-wrap: break-word; position: relative; font-size: 14.5px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .messages-box .message.sent { background: var(--bg-message-sent); color: var(--text-primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .messages-box .message.received { background: var(--bg-message-received); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 2px; }
        .messages-box .message .msg-text { word-wrap: break-word; }
        .messages-box .message .time { font-size: 11px; opacity: 0.6; margin-left: 10px; float: right; margin-top: 2px; }
        .messages-box .message img { max-width: 200px; max-height: 200px; border-radius: 8px; display: block; margin: 4px 0; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 10px; }
        .empty-state .icon { font-size: 64px; opacity: 0.2; }
        .empty-state h3 { color: var(--text-primary); font-weight: 400; font-size: 18px; }
        
        .chat-input { padding: 6px 16px; background: var(--bg-secondary); display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border-color); }
        .chat-input .attach-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; padding: 6px; transition: 0.2s; }
        .chat-input .attach-btn:hover { color: var(--text-primary); }
        .chat-input input { flex: 1; padding: 9px 16px; border-radius: 8px; border: none; background: var(--bg-message-received); color: var(--text-primary); font-size: 15px; outline: none; }
        .chat-input input::placeholder { color: var(--text-secondary); }
        .chat-input .send-btn { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .chat-input .send-btn:hover { background: #1da85a; }
        
        .image-preview { display: none; padding: 8px 16px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); align-items: center; gap: 12px; }
        .image-preview.show { display: flex; }
        .image-preview img { max-height: 80px; border-radius: 8px; }
        .image-preview .remove-btn { background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        /* ===== LOGIN ===== */
        .login-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; background: #0b141a; }
        .login-box { background: var(--bg-secondary); padding: 40px; border-radius: 24px; width: 420px; max-width: 92%; }
        .login-box .logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
        .login-box h1 { color: var(--text-primary); font-size: 26px; text-align: center; }
        .login-box .subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 28px; font-size: 14px; }
        .login-box .form-group { margin-bottom: 16px; }
        .login-box .form-group label { color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
        .login-box .form-group input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 15px; outline: none; transition: 0.2s; }
        .login-box .form-group input:focus { border-color: var(--accent); }
        .login-box .login-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .login-box .login-btn:hover { background: #1da85a; }
        .login-box .error { background: #3a1a1a; color: #f5a5a5; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; display: none; }
        .login-box .error.show { display: block; }
        .login-box .footer-text { color: var(--text-secondary); font-size: 12px; text-align: center; margin-top: 12px; }
        
        .hidden { display: none !important; }
        
        /* ===== SETTINGS MODAL ===== */
        .settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .settings-overlay.show { display: flex; }
        .settings-modal { background: var(--bg-secondary); padding: 30px; border-radius: 16px; width: 400px; max-width: 90%; }
        .settings-modal h2 { color: var(--text-primary); margin-bottom: 20px; }
        .settings-modal .form-group { margin-bottom: 14px; }
        .settings-modal .form-group label { color: var(--text-secondary); font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
        .settings-modal .form-group input, .settings-modal .form-group select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; outline: none; }
        .settings-modal .form-group input:focus, .settings-modal .form-group select:focus { border-color: var(--accent); }
        .settings-modal .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .settings-modal .modal-actions button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; flex: 1; }
        .settings-modal .modal-actions .save-btn { background: var(--accent); color: white; }
        .settings-modal .modal-actions .save-btn:hover { background: #1da85a; }
        .settings-modal .modal-actions .close-btn { background: var(--border-color); color: var(--text-primary); }
        .settings-modal .modal-actions .close-btn:hover { background: #3a4a52; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a4a52; }
        
        @media (max-width: 768px) {
            .app-container { max-height: 100vh; border-radius: 0; flex-direction: column; }
            .sidebar { width: 100%; max-height: 45%; min-width: unset; }
            .chat-area { height: 55%; }
            .messages-box { padding: 12px 16px; }
            .messages-box .message { max-width: 85%; }
            .settings-modal { width: 95%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ===== LOGIN PAGE ===== -->
        <div id="loginPage" class="login-container">
            <div class="login-box">
                <div class="logo">💬</div>
                <h1>Private Chat</h1>
                <p class="subtitle">Secure & Encrypted Messaging</p>
                <div id="loginError" class="error"></div>
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" id="loginUsername" placeholder="Choose a unique username" value="samir" />
                </div>
                <div class="form-group">
                    <label>🔑 Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" value="password123" />
                </div>
                <div class="form-group">
                    <label>📛 Display Name</label>
                    <input type="text" id="loginDisplayName" placeholder="Your display name" value="Samir001" />
                </div>
                <button class="login-btn" id="loginBtn">Login / Register</button>
                <p class="footer-text">* New account will be created if username doesn't exist</p>
            </div>
        </div>

        <!-- ===== CHAT APP ===== -->
        <div id="chatApp" class="app-container hidden">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="avatar" id="myAvatar">U</div>
                        <span class="name" id="myName">User</span>
                    </div>
                    <div class="header-actions">
                        <button id="settingsBtn" title="Settings">⚙️</button>
                        <button id="logoutBtn" title="Logout">🚪</button>
                    </div>
                </div>
                <div class="search-box">
                    <div class="search-wrapper">
                        <span>🔍</span>
                        <input type="text" id="searchUsers" placeholder="Search or start a new chat" />
                    </div>
                </div>
                <div class="users-list" id="usersList">
                    <div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">📡 Loading users...</div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header" id="chatHeader" style="display:none;">
                    <div class="avatar" id="chatAvatar" style="background:#25d366;">?</div>
                    <div class="info">
                        <div class="name" id="chatName">Select a user</div>
                        <div class="status" id="chatStatus">Online</div>
                    </div>
                    <div class="actions">
                        <button class="clear-btn" id="clearChatBtn" title="Clear chat">🗑️</button>
                    </div>
                </div>
                <div class="messages-box" id="messagesBox">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <h3>Select a user to start chatting</h3>
                        <p>Choose a contact from the sidebar</p>
                    </div>
                </div>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="" alt="Preview" />
                    <button class="remove-btn" id="removeImageBtn">✕ Remove</button>
                </div>
                <div class="chat-input" id="chatInput" style="display:none;">
                    <button class="attach-btn" id="attachBtn" title="Attach Image">📎</button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                    <button class="attach-btn" id="cameraBtn" title="Take Photo">📷</button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" />
                    <input type="text" id="messageInput" placeholder="Type a message..." />
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>
        </div>

        <!-- ===== SETTINGS MODAL ===== -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-modal">
                <h2>⚙️ Settings</h2>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" />
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" />
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" />
                </div>
                <div class="form-group">
                    <label>Theme</label>
                    <select id="themeSelect">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div id="settingsError" style="color:#f5a5a5; font-size:13px; margin-bottom:10px; display:none;"></div>
                <div class="modal-actions">
                    <button class="save-btn" id="saveSettingsBtn">Save</button>
                    <button class="close-btn" id="closeSettingsBtn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ✅ YOUR RENDER URL
        // ============================================================
        const API_BASE = 'https://private-chat-app-a5el.onrender.com';

        let currentUser = null;
        let currentToken = null;
        let selectedUserId = null;
        let messageInterval = null;
        let allUsers = [];
        let pendingImage = null;
        let currentTheme = 'dark';

        // DOM Elements
        const loginPage = document.getElementById('loginPage');
        const chatApp = document.getElementById('chatApp');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginDisplayName = document.getElementById('loginDisplayName');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const themeSelect = document.getElementById('themeSelect');
        const settingsError = document.getElementById('settingsError');
        const usersList = document.getElementById('usersList');
        const messagesBox = document.getElementById('messagesBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const myAvatar = document.getElementById('myAvatar');
        const myName = document.getElementById('myName');
        const chatHeader = document.getElementById('chatHeader');
        const chatInput = document.getElementById('chatInput');
        const chatAvatar = document.getElementById('chatAvatar');
        const chatName = document.getElementById('chatName');
        const chatStatus = document.getElementById('chatStatus');
        const searchUsers = document.getElementById('searchUsers');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const cameraBtn = document.getElementById('cameraBtn');
        const cameraInput = document.getElementById('cameraInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeImageBtn = document.getElementById('removeImageBtn');

        function showError(msg) {
            loginError.textContent = msg;
            loginError.classList.add('show');
            setTimeout(() => loginError.classList.remove('show'), 5000);
        }

        function showSettingsError(msg) {
            settingsError.textContent = msg;
            settingsError.style.display = 'block';
            setTimeout(() => settingsError.style.display = 'none', 4000);
        }

        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (currentToken) {
                headers['Authorization'] = `Bearer ${currentToken}`;
            }
            const response = await fetch(url, {
                ...options,
                headers,
                body: options.body ? JSON.stringify(options.body) : undefined
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'API request failed');
            }
            return response.json();
        }

        // ===== THEME =====
        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('chatTheme', theme);
            themeSelect.value = theme;
        }

        // ===== AUTH =====
        async function login() {
            const username = loginUsername.value.trim().toLowerCase();
            const password = loginPassword.value;
            const displayName = loginDisplayName.value.trim();

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            try {
                let result = await apiCall('/api/auth/login', {
                    method: 'POST',
                    body: { username, password }
                });
                handleAuthSuccess(result);
            } catch (error) {
                if (!displayName) {
                    showError('Please enter a display name to create new account');
                    return;
                }
                try {
                    const result = await apiCall('/api/auth/register', {
                        method: 'POST',
                        body: { username, password, displayName }
                    });
                    handleAuthSuccess(result);
                } catch (regError) {
                    showError(regError.message);
                }
            }
        }

        function handleAuthSuccess(data) {
            currentToken = data.token;
            currentUser = data.user;
            localStorage.setItem('chatToken', currentToken);
            localStorage.setItem('chatUser', JSON.stringify(currentUser));
            showChatApp();
            loadUsers();
            startPolling();
        }

        function logout() {
            currentToken = null;
            currentUser = null;
            selectedUserId = null;
            localStorage.removeItem('chatToken');
            localStorage.removeItem('chatUser');
            stopPolling();
            showLoginPage();
        }

        function showLoginPage() {
            loginPage.style.display = 'flex';
            chatApp.classList.add('hidden');
        }

        function showChatApp() {
            loginPage.style.display = 'none';
            chatApp.classList.remove('hidden');
            myAvatar.textContent = currentUser.displayName.charAt(0).toUpperCase();
            myName.textContent = currentUser.displayName;
        }

        // ===== USERS =====
        async function loadUsers() {
            try {
                const users = await apiCall('/api/users');
                allUsers = users;
                renderUsers(users);
            } catch (error) {
                usersList.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">❌ Failed to load users</div>`;
            }
        }

        function renderUsers(users) {
            if (users.length === 0) {
                usersList.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px; font-size:14px;">👤 No other users found.<br>Share this app with friends!</div>`;
                return;
            }
            usersList.innerHTML = users.map(user => `
                <div class="user-item" data-userid="${user.id}">
                    <div class="avatar" style="background: #${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')};">${user.displayName.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${user.displayName}</div>
                        <div class="last-msg">${user.username}</div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const userId = el.dataset.userid;
                    const user = allUsers.find(u => u.id === userId);
                    if (user) selectUser(user);
                });
            });
        }

        // ===== SELECT USER =====
        function selectUser(user) {
            selectedUserId = user.id;
            chatHeader.style.display = 'flex';
            chatInput.style.display = 'flex';
            const color = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
            chatAvatar.textContent = user.displayName.charAt(0).toUpperCase();
            chatAvatar.style.background = color;
            chatName.textContent = user.displayName;
            chatStatus.textContent = 'Online';

            document.querySelectorAll('.user-item').forEach(el => {
                el.classList.toggle('active', el.dataset.userid === user.id);
            });

            loadMessages();
        }

        // ===== MESSAGES =====
        async function loadMessages() {
            if (!selectedUserId) return;
            try {
                const messages = await apiCall(`/api/messages?withUserId=${selectedUserId}`);
                renderMessages(messages);
            } catch (error) {
                messagesBox.innerHTML = `<div style="color:var(--text-secondary); text-align:center; padding:40px 20px;">❌ Failed to load messages</div>`;
            }
        }

        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesBox.innerHTML = `<div class="empty-state"><div class="icon">👋</div><h3>No messages yet</h3><p>Say hello to your friend!</p></div>`;
                return;
            }
            messagesBox.innerHTML = messages.map(msg => {
                const isSent = msg.senderId === currentUser.id;
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let displayText = msg.ciphertext;
                let isImage = false;
                try {
                    const decoded = atob(msg.ciphertext);
                    if (decoded.startsWith('data:image')) {
                        isImage = true;
                        displayText = decoded;
                    } else {
                        displayText = decoded;
                        try {
                            displayText = decodeURIComponent(escape(decoded));
                        } catch(e) {}
                    }
                } catch(e) {}
                
                let content = isImage 
                    ? `<img src="${displayText}" alt="Image" />` 
                    : `<span class="msg-text">${displayText}</span>`;
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${content}
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const text = messageInput.value.trim();
            let imageData = pendingImage;

            if (!text && !imageData) return;
            if (!selectedUserId) {
                alert('Please select a user first');
                return;
            }

            try {
                let content = text;
                if (imageData) {
                    content = imageData;
                    pendingImage = null;
                    imagePreview.classList.remove('show');
                    previewImg.src = '';
                }
                const ciphertext = btoa(content);
                const iv = crypto.randomUUID();
                
                await apiCall('/api/messages', {
                    method: 'POST',
                    body: { receiverId: selectedUserId, ciphertext, iv }
                });
                messageInput.value = '';
                loadMessages();
            } catch (error) {
                alert('Failed to send: ' + error.message);
            }
        }

        // ===== IMAGE HANDLING =====
        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                pendingImage = e.target.result;
                previewImg.src = pendingImage;
                imagePreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
                e.target.value = '';
            }
        });

        cameraBtn.addEventListener('click', () => cameraInput.click());
        cameraInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImage(e.target.files[0]);
                e.target.value = '';
            }
        });

        removeImageBtn.addEventListener('click', () => {
            pendingImage = null;
            imagePreview.classList.remove('show');
            previewImg.src = '';
        });

        // ===== CLEAR CHAT =====
        async function clearChat() {
            if (!selectedUserId) return;
            if (!confirm('Delete all messages with this user?')) return;
            try {
                await apiCall('/api/messages/clear', {
                    method: 'POST',
                    body: { withUserId: selectedUserId }
                });
                loadMessages();
            } catch (error) {
                alert('Failed to clear chat: ' + error.message);
            }
        }

        // ===== SETTINGS =====
        async function saveSettings() {
            const currentPass = currentPassword.value;
            const newPass = newPassword.value;
            const confirmPass = confirmPassword.value;
            const theme = themeSelect.value;

            // Apply theme
            applyTheme(theme);

            // Change password if provided
            if (newPass || currentPass) {
                if (!currentPass) {
                    showSettingsError('Please enter current password');
                    return;
                }
                if (!newPass || newPass.length < 4) {
                    showSettingsError('New password must be at least 4 characters');
                    return;
                }
                if (newPass !== confirmPass) {
                    showSettingsError('New passwords do not match');
                    return;
                }

                try {
                    // Update password via API
                    await apiCall('/api/auth/change-password', {
                        method: 'POST',
                        body: { currentPassword: currentPass, newPassword: newPass }
                    });
                    showSettingsError('Password changed successfully!');
                    settingsError.style.color = '#4ade80';
                    setTimeout(() => {
                        settingsError.style.color = '#f5a5a5';
                        settingsError.style.display = 'none';
                    }, 3000);
                    currentPassword.value = '';
                    newPassword.value = '';
                    confirmPassword.value = '';
                } catch (error) {
                    showSettingsError(error.message);
                    return;
                }
            }

            // Close settings
            settingsOverlay.classList.remove('show');
        }

        // ===== POLLING =====
        function startPolling() {
            stopPolling();
            messageInterval = setInterval(() => {
                if (selectedUserId) loadMessages();
                loadUsers();
            }, 3000);
        }

        function stopPolling() {
            if (messageInterval) {
                clearInterval(messageInterval);
                messageInterval = null;
            }
        }

        // ===== SEARCH =====
        searchUsers.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.displayName.toLowerCase().includes(query) || 
                u.username.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        });

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', login);
        loginPassword.addEventListener('keypress', (e) => e.key === 'Enter' && login());
        logoutBtn.addEventListener('click', logout);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
        clearChatBtn.addEventListener('click', clearChat);
        
        settingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.add('show');
        });
        closeSettingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('show');
            settingsError.style.display = 'none';
        });
        saveSettingsBtn.addEventListener('click', saveSettings);
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) {
                settingsOverlay.classList.remove('show');
            }
        });

        // ===== INIT =====
        (async function init() {
            // Load theme
            const savedTheme = localStorage.getItem('chatTheme') || 'dark';
            applyTheme(savedTheme);

            const savedToken = localStorage.getItem('chatToken');
            const savedUser = localStorage.getItem('chatUser');
            if (savedToken && savedUser) {
                try {
                    currentToken = savedToken;
                    currentUser = JSON.parse(savedUser);
                    const me = await apiCall('/api/auth/me');
                    if (me.user) {
                        showChatApp();
                        loadUsers();
                        startPolling();
                        return;
                    }
                } catch (e) {
                    localStorage.removeItem('chatToken');
                    localStorage.removeItem('chatUser');
                }
            }
            showLoginPage();
        })();
    </script>
</body>
</html>
